<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card {
    animation: fadeInUp 1.0s ease-out;
}
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            font-family: 'Noto Sans JP', sans-serif;
        }

        .card {
            background: white;
            width: 85%;
            max-width: 350px;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: -50px;
            left: -50px;
            width: 100px;
            height: 100px;
            background: rgba(224, 195, 252, 0.4);
            border-radius: 50%;
        }

        .birthday-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            line-height: 1.8;
            font-size: 16px;
        }

        .footer-message {
            margin-top: 30px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="birthday-icon">🎂</div>
        <h1>Happy Birthday!</h1>
        <p>
            ＨＡＰＰＹＢＩＲＴＨＤＡＹ<br>
            🎉🕯🎂結衣ちゃん🎂🕯🎉<br>
            そして高校入学おめでとう<br>
            これからの3年間は<br>
            結衣ちゃんにとって<br>
            ずっと思い出に残る時間に<br>
            なるから<br>
            学校生活いっぱい楽しんでね<br>
            お菓子多すぎて<br>
            ジャーキー少なくなってごめんね<br>
            ちゃんと歯磨きしないと
            歯ボロボロなるで<br>
        </p>
        <div class="footer-message">2026.04.13</div>
    </div>

</body>
</html>
