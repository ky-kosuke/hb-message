<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            /* 全体の基本フォントはNoto Sans JP */
            font-family: 'Noto Sans JP', sans-serif; overflow: hidden;
        }

        /* 封筒とテキストをまとめるコンテナ */
        .envelope-container {
            display: flex; flex-direction: column; align-items: center;
            position: relative; z-index: 2;
        }

        /* 封筒の上のメッセージ */
        .tap-instruction {
            width: 500px;
            height: 100px;
            background: url('txt.png') no-repeat center center;
            background-size: contain;
            margin-bottom: 5px;
            opacity: 1; transition: opacity 0.5s;
        }

        /* 封筒のスタイル（透過PNG画像を使用） */
        .envelope {
            width: 500px; height: 300px;
            background: url('huto.png') no-repeat center center;
            background-size: contain;
            cursor: pointer; position: relative;
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        /* 開封後：封筒とメッセージの両方を透明にする */
        .envelope-container.open .envelope,
        .envelope-container.open .tap-instruction {
            opacity: 0; transform: translateY(20px); pointer-events: none;
        }

        /* メッセージカード */
        .card {
            width: 85%; max-width: 350px;
            padding: 40px 20px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center; position: absolute;
            z-index: 1; opacity: 0; transform: translateY(50px);
            transition: transform 1.0s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.8s;
            pointer-events: none;
            background:
                linear-gradient(rgba(255, 255, 255, 0.9) 30%, rgba(255, 255, 255, 0.4) 100%),
                url('card_bg.png') no-repeat center center;
            background-size: cover;
        }

        /* 開封アニメーション */
        .card.show {
            opacity: 1; transform: translateY(0); pointer-events: auto;
        }

        .card::before {
            content: ""; position: absolute; top: -50px; left: -50px;
            width: 100px; height: 100px; background: rgba(224, 195, 252, 0.4);
            border-radius: 50%;
        }

        .birthday-icon { font-size: 50px; margin-bottom: 20px; }
        h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; line-height: 1.8; font-size: 16px; }
        .footer-message { margin-top: 30px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <div id="particles-js" style="position:fixed; width:100%; height:100%; top:0; left:0; z-index:1; opacity:0; transition:opacity 1.5s;"></div>
    <div class="envelope-container" id="envelopeContainer" onclick="openCard()">
        <div class="tap-instruction"></div>
        <div class="envelope" id="envelope"></div>
    </div>
    <div class="card" id="card">
        <div class="birthday-icon">🎂</div>
        <h1>ＨＡＰＰＹＢＩＲＴＨＤＡＹ</h1>
        <p>
            🎉🕯🎂結衣ちゃん🎂🕯🎉<br>
            16歳のお誕生日おめでとう<br>
            そして高校入学おめでとう<br>
            これからの3年間は<br>
            結衣ちゃんにとって<br>
            ずっと思い出に残る時間に<br>
            なるから<br>
            学校生活いっぱい楽しんでね<br>
            お菓子多すぎて<br>
            ジャーキー少なくなってごめんね<br>
            ちゃんと歯磨きしないと<br>
            歯ボロボロなるで<br>
        </p>
        <div class="footer-message">2026.04.13</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        function openCard() {
            // コンテナごと操作
            const container = document.getElementById('envelopeContainer');
            const card = document.getElementById('card');
            const particles = document.getElementById('particles-js');

            container.classList.add('open');
            
            setTimeout(() => {
                card.classList.add('show');
                particles.style.opacity = '1';
            }, 200);

            // 紙吹雪
            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.6 },
                    colors: ['#fbc2eb', '#a6c1ee', '#ff69b4', '#ffb6c1', '#ffffff']
                });
            }, 600);

            //キラキラ
            particlesJS("particles-js", {
            "particles": {
            "number": { "value": 120, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": ["#fbc2eb", "#a6c1ee", "#ffffff", "#ff69b4"] },
            "shape": { "type": "circle", "star" },
            "opacity": { 
                "value": 0.8, 
                "random": true, 
                "anim": { "enable": true, "speed": 1, "opacity_min": 0.3, "sync": false } 
            },
            "size": { 
                "value": 8, 
                "random": true, 
                "anim": { "enable": true, "speed": 5, "size_min": 0.5, "sync": false } 
            },
            "line_linked": { "enable": false },
            "move": { 
                "enable": true, 
                "speed": 4, 
                "direction": "none", 
                "random": true, 
                "straight": false, 
                "out_mode": "out", 
                "bounce": false 
            }
        },
        "retina_detect": true
    });
        }
    </script>
</body>
</html>
