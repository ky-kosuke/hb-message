<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* フェードインアニメーション */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            font-family: 'Noto Sans JP', sans-serif; overflow: hidden;
        }

        /* 封筒の見た目 */
        .envelope {
            width: 300px; height: 200px; background: #fff;
            border-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; position: relative; z-index: 2;
            transition: 0.5s;
        }

        .envelope::after {
            content: "Tap to Open ✉️"; color: #aaa; font-size: 14px;
        }

        /* 開封後の封筒（下にズラす） */
        .envelope.open {
            transform: translateY(150px);
            opacity: 0.8;
        }

        /* メッセージカード（最初は隠しておく） */
        .card {
            background: white; width: 85%; max-width: 350px;
            padding: 40px 20px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center; position: absolute;
            z-index: 1; opacity: 0; transform: translateY(0);
            transition: transform 1.2s ease-out, opacity 0.8s;
            pointer-events: none;
        }

        /* 開封アニメーション：カードがせり上がる */
        .card.show {
            opacity: 1; transform: translateY(-100px); /* 上にスッと出てくる */
            pointer-events: auto;
        }

        .card::before {
            content: ""; position: absolute; top: -50px; left: -50px;
            width: 100px; height: 100px; background: rgba(224, 195, 252, 0.4);
            border-radius: 50%;
        }

        .birthday-icon { font-size: 50px; margin-bottom: 20px; }
        h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        p { color: #666; line-height: 1.8; font-size: 16px; }
        .footer-message { margin-top: 30px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div class="envelope" id="envelope" onclick="openCard()"></div>

    <div class="card" id="card">
        <div class="birthday-icon">🎂</div>
        <h1>ＨＡＰＰＹＢＩＲＴＨＤＡＹ</h1>
        <p>
            🎉🕯🎂結衣ちゃん🎂🕯🎉<br>
            そして高校入学おめでとう<br>
            これからの3年間は<br>
            結衣ちゃんにとって<br>
            ずっと思い出に残る時間に<br>
            なるから<br>
            学校生活いっぱい楽しんでね<br>
            お菓子多すぎて<br>
            ジャーキー少なくなってごめんね<br>
            ちゃんと歯磨きしないと<br>
            歯ボロボロなるで<br>
        </p>
        <div class="footer-message">2026.04.13</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        function openCard() {
            // 封筒とカードの要素を取得
            const envelope = document.getElementById('envelope');
            const card = document.getElementById('card');

            // 封筒を消してカードを出す
            envelope.classList.add('open');
            card.classList.add('show');

            // カードが出てきた瞬間に紙吹雪！
            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.7 },
                    colors: ['#fbc2eb', '#a6c1ee', '#ff69b4', '#ffb6c1', '#ffffff']
                });
            }, 300);
        }
    </script>
</body>
</html>
